# This file tells GitHub Actions WHEN and HOW to run your flight tracker.

name: Check Flight Prices

# WHEN to run:
on:
  schedule:
    # Run every 6 hours: at midnight, 6 AM, noon, and 6 PM (UTC time)
    # Cron format: "minute hour day-of-month month day-of-week"
    - cron: '0 */6 * * *'

  workflow_dispatch: # Adds a button to run manually anytime

# WHAT to run:
jobs:
  check-prices:
    runs-on: ubuntu-latest # Use a free Linux computer from GitHub
    permissions:
      contents: write # Allow saving files back to the repo

    steps:
      # Step 1: Download your repository's code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Install Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Step 3: Run the flight tracker script
      # The 'env' section passes your secrets to the script securely
      - name: Run flight tracker
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python flight_tracker.py

      # Step 4: Save the updated price history back to the repository
      - name: Commit price history
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add price_history.csv
          git diff --staged --quiet || git commit -m "Update price history [$(date -u +'%Y-%m-%d %H:%M UTC')]"
          git push
